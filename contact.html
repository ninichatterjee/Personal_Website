<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Devanshi Chatterjee</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Internal CSS for form-specific styles -->
    <style>
        .form-group {
            margin-bottom: 20px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4B0082;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        .required {
            color: #ff9ecd;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .checkbox-label input[type="radio"],
        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }
        input[type="tel"]::placeholder {
            color: #999;
        }
        .contact-form {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-buttons">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="contact-section">
        <h1 class="contact-title">Contact Information</h1>

        <div class="contact-card">
            <div class="contact-info">
                <h2>Get in Touch</h2>
                <p><a href="mailto:dchatterjee16194@upei.ca">dchatterjee16194@upei.ca</a></p>
                <p>Charlottetown, Prince Edward Island, Canada</p>
                
                <div class="contact-social">
                    <a href="https://github.com/ninichatterjee" target="_blank">
                        <img src="images/github.png" alt="GitHub">
                        GitHub
                    </a>
                    <a href="https://www.linkedin.com/in/ditthi-chatterjee" target="_blank">
                        <img src="images/linkedin.png" alt="LinkedIn">
                        LinkedIn
                    </a>
                </div>
            </div>
        </div>

        <div class="contact-card">
            <h2>Send Me a Message</h2>
            <form action="https://formspree.io/f/mdkaqajo" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="1234567890">
                </div>

                <div class="form-group">
                    <label>Preferred Mode of Communication <span class="required">*</span></label>
                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" name="communication[]" value="email"> Email
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="communication[]" value="phone"> Phone Call
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="communication[]" value="linkedin"> LinkedIn Message
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                        <option value="general">General Inquiry</option>
                        <option value="project">Project Collaboration</option>
                        <option value="opportunity">Job Opportunity</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-button">Send Message</button>
            </form>
        </div>
    </main>

    <script src="js/contact.js"></script>
    <script src="js/page-transition.js"></script>
</body>
</html>
